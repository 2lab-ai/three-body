<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three-Body Problem — 3D Gravitational Simulation</title>

<meta property="og:title" content="Three-Body Problem — 3D Gravitational Simulation">
<meta property="og:description" content="Watch 3 bodies dance in chaotic gravitational orbits. Click to spawn planets. No analytical solution exists.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪐</text></svg>">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    height: 100vh;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    color: #ccc;
    cursor: crosshair;
  }
  canvas { display: block; }

  #ui {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
    z-index: 10;
  }

  #hud-top {
    position: fixed;
    top: 16px;
    left: 20px;
    font-size: 13px;
    opacity: 0.5;
    z-index: 20;
    line-height: 1.7;
  }
  #hud-top .title {
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    opacity: 0.7;
    margin-bottom: 4px;
  }

  #hud-right {
    position: fixed;
    top: 16px;
    right: 20px;
    font-size: 11px;
    opacity: 0.35;
    z-index: 20;
    text-align: right;
    line-height: 1.6;
  }

  #info {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    z-index: 20;

    pointer-events: auto;
    line-height: 1.6;
  }
  #info a { color: rgba(255,255,255,0.5); text-decoration: none; }
  #info a:hover { color: rgba(255,255,255,0.8); }

  #planet-indicators {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);

    gap: 16px;

  }
  .planet-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .planet-dot.active {
    border-color: transparent;
    box-shadow: 0 0 8px 2px currentColor;
  }
  .planet-dot.empty {
    opacity: 0.3;
  }

  #spawn-hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    color: rgba(255,255,255,0.15);
    z-index: 20;
    transition: opacity 0.5s;
    text-align: center;
    line-height: 1.8;
  }

  .energy-bar {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 3px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    z-index: 20;
    overflow: hidden;
  }
  .energy-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #4488ff, #ff4444);
    width: 50%;
    transition: width 0.3s;
    border-radius: 2px;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="hud-top">
    <div class="title">THREE-BODY PROBLEM</div>
    <div id="status">bodies: 0/3</div>
    <div id="time-display">t = 0.00</div>
    <div id="energy-display">E = 0</div>
  </div>

  <div id="hud-right">
    <div id="fps-display">60 fps</div>
    <div id="integrator-display">Verlet</div>
    <div id="dt-display">dt = 0.002</div>
  </div>

  <div id="spawn-hint">
    click to spawn a planet<br>
    <span style="font-size:12px;opacity:0.6">up to 3 bodies</span>
  </div>

  <div id="planet-indicators">
    <div class="planet-dot empty" id="dot0"></div>
    <div class="planet-dot empty" id="dot1"></div>
    <div class="planet-dot empty" id="dot2"></div>
  </div>

  <div class="energy-bar"><div class="energy-bar-fill" id="energy-fill"></div></div>
</div>

<div id="info">
  drag to orbit · scroll to zoom · click to spawn · R to reset · T for trails · P to pause<br>
  <a href="https://github.com/2lab-ai/three-body" target="_blank">source</a>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.172.0",
    "three/addons/": "https://esm.sh/three@0.172.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

// ========================
// SIMULATION CONSTANTS
// ========================
const G = 800            // gravitational constant
const DT = 0.002         // time step
const SUBSTEPS = 4       // physics substeps per frame
const TRAIL_LENGTH = 600 // trail history length
const SOFTENING = 2.0    // prevent singularities
const MAX_BODIES = 3

// ========================
// PLANET CONFIGS
// ========================
const PLANET_CONFIGS = [
  { color: 0x4488ff, emissive: 0x2244aa, mass: 100, radius: 2.5, name: 'Alpha' },
  { color: 0xff6644, emissive: 0xaa3322, mass: 100, radius: 2.5, name: 'Beta' },
  { color: 0x44ff88, emissive: 0x22aa44, mass: 100, radius: 2.5, name: 'Gamma' },
]

// ========================
// THREE.JS SETUP
// ========================
const scene = new THREE.Scene()
scene.fog = new THREE.FogExp2(0x000000, 0.003)

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000)
camera.position.set(0, 40, 80)

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true })
renderer.setSize(window.innerWidth, window.innerHeight)
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
renderer.toneMapping = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 1.2
document.body.appendChild(renderer.domElement)

// Controls
const controls = new OrbitControls(camera, renderer.domElement)
controls.enableDamping = true
controls.dampingFactor = 0.05
controls.minDistance = 15
controls.maxDistance = 500
controls.autoRotate = false
controls.autoRotateSpeed = 0.3

// ========================
// LIGHTING
// ========================
const ambient = new THREE.AmbientLight(0x222233, 0.5)
scene.add(ambient)

const pointLight = new THREE.PointLight(0xffffff, 1.5, 300)
pointLight.position.set(0, 30, 0)
scene.add(pointLight)

// ========================
// STARFIELD
// ========================
function createStarfield() {
  const geo = new THREE.BufferGeometry()
  const count = 3000
  const positions = new Float32Array(count * 3)
  const colors = new Float32Array(count * 3)
  const sizes = new Float32Array(count)

  for (let i = 0; i < count; i++) {
    const r = 300 + Math.random() * 700
    const theta = Math.random() * Math.PI * 2
    const phi = Math.acos(2 * Math.random() - 1)
    positions[i*3] = r * Math.sin(phi) * Math.cos(theta)
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta)
    positions[i*3+2] = r * Math.cos(phi)

    const c = new THREE.Color()
    c.setHSL(0.55 + Math.random() * 0.15, 0.3, 0.6 + Math.random() * 0.4)
    colors[i*3] = c.r
    colors[i*3+1] = c.g
    colors[i*3+2] = c.b

    sizes[i] = 0.5 + Math.random() * 2
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3))
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3))
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1))

  const mat = new THREE.PointsMaterial({
    size: 1.5,
    vertexColors: true,
    transparent: true,
    opacity: 0.6,
    sizeAttenuation: true,
  })

  return new THREE.Points(geo, mat)
}
scene.add(createStarfield())

// Grid (subtle reference plane)
const gridHelper = new THREE.GridHelper(200, 40, 0x111122, 0x0a0a15)
gridHelper.material.transparent = true
gridHelper.material.opacity = 0.3
scene.add(gridHelper)

// ========================
// BODY CLASS
// ========================
class Body {
  constructor(config, position, velocity) {
    this.mass = config.mass
    this.pos = position.clone()
    this.vel = velocity.clone()
    this.acc = new THREE.Vector3()
    this.prevAcc = new THREE.Vector3()
    this.config = config
    this.trailPositions = []

    // Mesh
    const geo = new THREE.SphereGeometry(config.radius, 32, 32)
    const mat = new THREE.MeshStandardMaterial({
      color: config.color,
      emissive: config.emissive,
      emissiveIntensity: 0.8,
      roughness: 0.3,
      metalness: 0.7,
    })
    this.mesh = new THREE.Mesh(geo, mat)
    this.mesh.position.copy(this.pos)

    // Glow
    const glowGeo = new THREE.SphereGeometry(config.radius * 1.8, 16, 16)
    const glowMat = new THREE.MeshBasicMaterial({
      color: config.color,
      transparent: true,
      opacity: 0.12,
      side: THREE.BackSide,
    })
    this.glow = new THREE.Mesh(glowGeo, glowMat)
    this.mesh.add(this.glow)

    // Point light on body
    this.light = new THREE.PointLight(config.color, 0.6, 50)
    this.mesh.add(this.light)

    // Trail
    const trailMat = new THREE.LineBasicMaterial({
      color: config.color,
      transparent: true,
      opacity: 0.5,
      linewidth: 1,
    })
    const trailGeo = new THREE.BufferGeometry()
    const trailArr = new Float32Array(TRAIL_LENGTH * 3)
    trailGeo.setAttribute('position', new THREE.BufferAttribute(trailArr, 3))
    trailGeo.setDrawRange(0, 0)
    this.trail = new THREE.Line(trailGeo, trailMat)
    this.trailArray = trailArr

    // Velocity vector arrow
    this.arrow = new THREE.ArrowHelper(
      new THREE.Vector3(1,0,0), this.pos, 5, config.color, 1.5, 1
    )
    this.arrow.visible = false

    scene.add(this.mesh)
    scene.add(this.trail)
    scene.add(this.arrow)
  }

  updateTrail() {
    this.trailPositions.push(this.pos.clone())
    if (this.trailPositions.length > TRAIL_LENGTH) {
      this.trailPositions.shift()
    }

    const arr = this.trailArray
    const len = this.trailPositions.length
    for (let i = 0; i < len; i++) {
      arr[i*3] = this.trailPositions[i].x
      arr[i*3+1] = this.trailPositions[i].y
      arr[i*3+2] = this.trailPositions[i].z
    }
    this.trail.geometry.attributes.position.needsUpdate = true
    this.trail.geometry.setDrawRange(0, len)
  }

  updateMesh(time) {
    this.mesh.position.copy(this.pos)

    // Pulsing glow
    const pulse = 1 + Math.sin(time * 3 + this.config.color) * 0.1
    this.glow.scale.setScalar(pulse)

    // Velocity arrow
    if (showVelocity && this.vel.length() > 0.1) {
      this.arrow.visible = true
      this.arrow.position.copy(this.pos)
      this.arrow.setDirection(this.vel.clone().normalize())
      this.arrow.setLength(this.vel.length() * 0.5, 1.5, 1)
    } else {
      this.arrow.visible = false
    }
  }

  remove() {
    scene.remove(this.mesh)
    scene.remove(this.trail)
    scene.remove(this.arrow)
  }
}

// ========================
// SIMULATION STATE
// ========================
let bodies = []
let simTime = 0
let paused = false
let showTrails = true
let showVelocity = false
let fps = 60
let frameCount = 0
let lastFpsTime = performance.now()

// ========================
// PHYSICS: Velocity Verlet
// ========================
function computeAccelerations() {
  for (const b of bodies) {
    b.prevAcc.copy(b.acc)
    b.acc.set(0, 0, 0)
  }

  for (let i = 0; i < bodies.length; i++) {
    for (let j = i + 1; j < bodies.length; j++) {
      const a = bodies[i]
      const b = bodies[j]

      const dx = b.pos.x - a.pos.x
      const dy = b.pos.y - a.pos.y
      const dz = b.pos.z - a.pos.z
      const distSq = dx*dx + dy*dy + dz*dz + SOFTENING * SOFTENING
      const dist = Math.sqrt(distSq)
      const force = G / (distSq * dist) // F/m = G*M/r^2, combined direction

      a.acc.x += force * b.mass * dx
      a.acc.y += force * b.mass * dy
      a.acc.z += force * b.mass * dz
      b.acc.x -= force * a.mass * dx
      b.acc.y -= force * a.mass * dy
      b.acc.z -= force * a.mass * dz
    }
  }
}

function step(dt) {
  if (bodies.length < 2) return

  // Velocity Verlet integration
  // x(t+dt) = x(t) + v(t)*dt + 0.5*a(t)*dt^2
  for (const b of bodies) {
    b.pos.x += b.vel.x * dt + 0.5 * b.acc.x * dt * dt
    b.pos.y += b.vel.y * dt + 0.5 * b.acc.y * dt * dt
    b.pos.z += b.vel.z * dt + 0.5 * b.acc.z * dt * dt
  }

  // Compute new accelerations
  const oldAccs = bodies.map(b => b.acc.clone())
  computeAccelerations()

  // v(t+dt) = v(t) + 0.5*(a(t) + a(t+dt))*dt
  for (let i = 0; i < bodies.length; i++) {
    const b = bodies[i]
    b.vel.x += 0.5 * (oldAccs[i].x + b.acc.x) * dt
    b.vel.y += 0.5 * (oldAccs[i].y + b.acc.y) * dt
    b.vel.z += 0.5 * (oldAccs[i].z + b.acc.z) * dt
  }

  simTime += dt
}

function computeEnergy() {
  let kinetic = 0
  let potential = 0

  for (const b of bodies) {
    kinetic += 0.5 * b.mass * b.vel.lengthSq()
  }

  for (let i = 0; i < bodies.length; i++) {
    for (let j = i + 1; j < bodies.length; j++) {
      const dist = bodies[i].pos.distanceTo(bodies[j].pos)
      potential -= G * bodies[i].mass * bodies[j].mass / Math.max(dist, SOFTENING)
    }
  }

  return { kinetic, potential, total: kinetic + potential }
}

// ========================
// SPAWNING
// ========================
const raycaster = new THREE.Raycaster()
const mouse = new THREE.Vector2()
const spawnPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0)

function spawnBody(screenX, screenY) {
  if (bodies.length >= MAX_BODIES) return

  mouse.x = (screenX / window.innerWidth) * 2 - 1
  mouse.y = -(screenY / window.innerHeight) * 2 + 1

  raycaster.setFromCamera(mouse, camera)
  const intersection = new THREE.Vector3()
  raycaster.ray.intersectPlane(spawnPlane, intersection)

  if (!intersection) {
    // If no intersection with plane, project forward
    intersection.copy(raycaster.ray.at(50, new THREE.Vector3()))
  }

  const idx = bodies.length
  const config = PLANET_CONFIGS[idx]

  // Give initial velocity perpendicular to position (orbital)
  let vel = new THREE.Vector3()
  if (bodies.length > 0) {
    // Calculate velocity for quasi-stable orbit around center of mass
    const com = getCenterOfMass()
    const toCenter = com.clone().sub(intersection)
    const dist = toCenter.length()

    // v = sqrt(G*M/r) for circular orbit, but we add some perturbation
    const totalMass = bodies.reduce((s, b) => s + b.mass, 0)
    const orbitalSpeed = Math.sqrt(G * totalMass / Math.max(dist, 5)) * 0.6

    // Perpendicular direction (cross with up)
    vel = toCenter.clone().cross(new THREE.Vector3(0, 1, 0)).normalize()
    vel.multiplyScalar(orbitalSpeed)

    // Add slight y-component for 3D orbits
    vel.y += (Math.random() - 0.5) * orbitalSpeed * 0.3
  }

  const body = new Body(config, intersection, vel)
  bodies.push(body)

  // Initial acceleration compute
  computeAccelerations()

  // Update UI
  updateUI()
  updatePlanetDots()

  // Flash effect
  createSpawnFlash(intersection, config.color)
}

function getCenterOfMass() {
  const com = new THREE.Vector3()
  let totalMass = 0
  for (const b of bodies) {
    com.addScaledVector(b.pos, b.mass)
    totalMass += b.mass
  }
  if (totalMass > 0) com.divideScalar(totalMass)
  return com
}

function createSpawnFlash(pos, color) {
  const geo = new THREE.SphereGeometry(1, 16, 16)
  const mat = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: 0.8,
  })
  const flash = new THREE.Mesh(geo, mat)
  flash.position.copy(pos)
  scene.add(flash)

  let scale = 1
  function animate() {
    scale += 0.8
    mat.opacity -= 0.04
    flash.scale.setScalar(scale)
    if (mat.opacity > 0) {
      requestAnimationFrame(animate)
    } else {
      scene.remove(flash)
      geo.dispose()
      mat.dispose()
    }
  }
  animate()
}

// ========================
// UI UPDATES
// ========================
const statusEl = document.getElementById('status')
const timeEl = document.getElementById('time-display')
const energyEl = document.getElementById('energy-display')
const fpsEl = document.getElementById('fps-display')
const hintEl = document.getElementById('spawn-hint')
const energyFill = document.getElementById('energy-fill')

function updateUI() {
  statusEl.textContent = `bodies: ${bodies.length}/${MAX_BODIES}`

  if (bodies.length >= MAX_BODIES) {
    hintEl.style.opacity = '0'
  } else if (bodies.length > 0) {
    hintEl.textContent = `click to add body ${bodies.length + 1}/3`
    hintEl.style.fontSize = '14px'
  }
}

function updatePlanetDots() {
  for (let i = 0; i < 3; i++) {
    const dot = document.getElementById(`dot${i}`)
    if (i < bodies.length) {
      dot.classList.add('active')
      dot.classList.remove('empty')
      dot.style.backgroundColor = `#${PLANET_CONFIGS[i].color.toString(16).padStart(6, '0')}`
      dot.style.color = `#${PLANET_CONFIGS[i].color.toString(16).padStart(6, '0')}`
    } else {
      dot.classList.remove('active')
      dot.classList.add('empty')
      dot.style.backgroundColor = 'transparent'
    }
  }
}

// ========================
// EVENTS
// ========================
renderer.domElement.addEventListener('click', e => {
  // Ignore if user was dragging
  if (isDragging) return
  spawnBody(e.clientX, e.clientY)
})

let isDragging = false
let mouseDownPos = { x: 0, y: 0 }

renderer.domElement.addEventListener('pointerdown', e => {
  mouseDownPos = { x: e.clientX, y: e.clientY }
  isDragging = false
})

renderer.domElement.addEventListener('pointermove', e => {
  const dx = e.clientX - mouseDownPos.x
  const dy = e.clientY - mouseDownPos.y
  if (Math.sqrt(dx*dx + dy*dy) > 5) isDragging = true
})

window.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') {
    // Reset
    for (const b of bodies) b.remove()
    bodies = []
    simTime = 0
    updateUI()
    updatePlanetDots()
    hintEl.style.opacity = '1'
    hintEl.textContent = 'click to spawn a planet'
    hintEl.style.fontSize = '18px'
  }
  if (e.key === 'p' || e.key === 'P') {
    paused = !paused
  }
  if (e.key === 't' || e.key === 'T') {
    showTrails = !showTrails
    for (const b of bodies) b.trail.visible = showTrails
  }
  if (e.key === 'v' || e.key === 'V') {
    showVelocity = !showVelocity
  }
  if (e.key === 'c' || e.key === 'C') {
    // Center camera on center of mass
    const com = getCenterOfMass()
    controls.target.copy(com)
  }
  if (e.key === 'a' || e.key === 'A') {
    controls.autoRotate = !controls.autoRotate
  }
})

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(window.innerWidth, window.innerHeight)
})

// Touch: tap to spawn
let touchStart = null
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, time: Date.now() }
  }
})
renderer.domElement.addEventListener('touchend', e => {
  if (touchStart && Date.now() - touchStart.time < 300) {
    const dx = e.changedTouches[0].clientX - touchStart.x
    const dy = e.changedTouches[0].clientY - touchStart.y
    if (Math.sqrt(dx*dx + dy*dy) < 15) {
      spawnBody(touchStart.x, touchStart.y)
    }
  }
  touchStart = null
})

// ========================
// RENDER LOOP
// ========================
let initialEnergy = null

function animate() {
  requestAnimationFrame(animate)

  // Physics substeps
  if (!paused && bodies.length >= 2) {
    for (let s = 0; s < SUBSTEPS; s++) {
      step(DT)
    }

    // Update trails every few frames
    if (frameCount % 2 === 0) {
      for (const b of bodies) b.updateTrail()
    }
  }

  // Update meshes
  const time = performance.now() * 0.001
  for (const b of bodies) {
    b.updateMesh(time)
  }

  // Camera follow center of mass gently
  if (bodies.length > 0) {
    const com = getCenterOfMass()
    controls.target.lerp(com, 0.02)
  }

  controls.update()
  renderer.render(scene, camera)

  // HUD updates
  frameCount++
  const now = performance.now()
  if (now - lastFpsTime > 500) {
    fps = Math.round(frameCount / ((now - lastFpsTime) / 1000))
    frameCount = 0
    lastFpsTime = now
    fpsEl.textContent = `${fps} fps`
  }

  timeEl.textContent = `t = ${simTime.toFixed(2)}`

  if (bodies.length >= 2 && frameCount % 10 === 0) {
    const e = computeEnergy()
    energyEl.textContent = `E = ${e.total.toFixed(0)}`

    if (initialEnergy === null) initialEnergy = e.total
    // Energy conservation indicator (should stay near 50% if well-conserved)
    const drift = initialEnergy !== 0
      ? Math.abs((e.total - initialEnergy) / initialEnergy)
      : 0
    const fillPct = Math.max(0, Math.min(100, 50 + drift * 1000))
    energyFill.style.width = `${fillPct}%`
  }
}

// Start
updateUI()
updatePlanetDots()
animate()
</script>
</body>
</html>
