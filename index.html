<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js'
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js'
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js'

// ========================
// CONSTANTS
// ========================
const G = 600
const BASE_DT = 0.002
const BASE_SUBSTEPS = 4
const TRAIL_LENGTH = 800
const SOFTENING = 3.0
const MAX_BODIES = 3
const COLLISION_RADIUS = 5
const BOUNCE_DAMPING = 0.7

// ========================
// PLANET CONFIGS
// ========================
const PLANET_CONFIGS = [
  { color: 0x4488ff, emissive: 0x1133aa, mass: 120, radius: 2.8, name: 'Alpha' },
  { color: 0xff6644, emissive: 0xaa2211, mass: 100, radius: 2.4, name: 'Beta' },
  { color: 0x44ff88, emissive: 0x11aa33, mass: 80,  radius: 2.0, name: 'Gamma' },
]

// ========================
// THREE.JS SETUP
// ========================
const scene = new THREE.Scene()
scene.fog = new THREE.FogExp2(0x000005, 0.002)

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 3000)
camera.position.set(0, 50, 90)

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(window.innerWidth, window.innerHeight)
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
renderer.toneMapping = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 1.3
document.body.appendChild(renderer.domElement)

const controls = new OrbitControls(camera, renderer.domElement)
controls.enableDamping = true
controls.dampingFactor = 0.06
controls.minDistance = 15
controls.maxDistance = 400
controls.autoRotateSpeed = 0.4

// Post-processing: Bloom
const composer = new EffectComposer(renderer)
composer.addPass(new RenderPass(scene, camera))
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.6,   // strength
  0.4,   // radius
  0.85   // threshold
)
composer.addPass(bloomPass)

// ========================
// LIGHTING
// ========================
scene.add(new THREE.AmbientLight(0x181830, 0.6))
const sunLight = new THREE.DirectionalLight(0xffeedd, 0.4)
sunLight.position.set(50, 80, 30)
scene.add(sunLight)

// ========================
// STARFIELD
// ========================
{
  const geo = new THREE.BufferGeometry()
  const N = 4000
  const pos = new Float32Array(N * 3)
  const col = new Float32Array(N * 3)
  for (let i = 0; i < N; i++) {
    const r = 400 + Math.random() * 800
    const th = Math.random() * Math.PI * 2
    const ph = Math.acos(2 * Math.random() - 1)
    pos[i*3]   = r * Math.sin(ph) * Math.cos(th)
    pos[i*3+1] = r * Math.sin(ph) * Math.sin(th)
    pos[i*3+2] = r * Math.cos(ph)
    const c = new THREE.Color().setHSL(0.55 + Math.random() * 0.2, 0.2 + Math.random() * 0.3, 0.5 + Math.random() * 0.5)
    col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3))
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3))
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    size: 1.2, vertexColors: true, transparent: true, opacity: 0.5, sizeAttenuation: true,
  })))
}

// Reference grid
{
  const g = new THREE.GridHelper(200, 40, 0x0c0c1a, 0x080810)
  g.material.transparent = true
  g.material.opacity = 0.25
  scene.add(g)
}

// ========================
// GRAVITY LINES MATERIAL (dashed)
// ========================
const gravLineMat = new THREE.LineDashedMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0.08,
  dashSize: 2,
  gapSize: 2,
  linewidth: 1,
})

// Gravity connection lines (will be created when bodies exist)
let gravLines = []

function rebuildGravLines() {
  for (const l of gravLines) scene.remove(l)
  gravLines = []

  for (let i = 0; i < bodies.length; i++) {
    for (let j = i + 1; j < bodies.length; j++) {
      const geo = new THREE.BufferGeometry()
      const pos = new Float32Array(6) // 2 points
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3))
      const mat = gravLineMat.clone()
      const line = new THREE.Line(geo, mat)
      line.computeLineDistances()
      gravLines.push({ line, i, j, geo, mat, posArr: pos })
      scene.add(line)
    }
  }
}

function updateGravLines() {
  for (const gl of gravLines) {
    const a = bodies[gl.i]
    const b = bodies[gl.j]
    if (!a || !b) continue
    gl.posArr[0] = a.pos.x; gl.posArr[1] = a.pos.y; gl.posArr[2] = a.pos.z
    gl.posArr[3] = b.pos.x; gl.posArr[4] = b.pos.y; gl.posArr[5] = b.pos.z
    gl.geo.attributes.position.needsUpdate = true
    gl.line.computeLineDistances()

    // Opacity based on distance
    const dist = a.pos.distanceTo(b.pos)
    gl.mat.opacity = Math.max(0.02, 0.12 - dist * 0.001)
  }
}

// ========================
// BODY CLASS
// ========================
class Body {
  constructor(config, position, velocity) {
    this.mass = config.mass
    this.pos = position.clone()
    this.vel = velocity.clone()
    this.acc = new THREE.Vector3()
    this.config = config
    this.trailPositions = []
    this.alive = true

    // Main sphere
    const geo = new THREE.SphereGeometry(config.radius, 32, 32)
    const mat = new THREE.MeshStandardMaterial({
      color: config.color,
      emissive: config.emissive,
      emissiveIntensity: 1.0,
      roughness: 0.2,
      metalness: 0.8,
    })
    this.mesh = new THREE.Mesh(geo, mat)
    this.mesh.position.copy(this.pos)

    // Outer glow shell
    const glowGeo = new THREE.SphereGeometry(config.radius * 2.2, 16, 16)
    const glowMat = new THREE.MeshBasicMaterial({
      color: config.color,
      transparent: true,
      opacity: 0.08,
      side: THREE.BackSide,
    })
    this.glow = new THREE.Mesh(glowGeo, glowMat)
    this.mesh.add(this.glow)

    // Inner light
    this.light = new THREE.PointLight(config.color, 0.8, 60)
    this.mesh.add(this.light)

    // Trail — use line with vertex colors for speed-based coloring
    this.trailMaxLen = TRAIL_LENGTH
    const trailGeo = new THREE.BufferGeometry()
    const trailPos = new Float32Array(TRAIL_LENGTH * 3)
    const trailCol = new Float32Array(TRAIL_LENGTH * 3)
    trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3))
    trailGeo.setAttribute('color', new THREE.BufferAttribute(trailCol, 3))
    trailGeo.setDrawRange(0, 0)

    const trailMat = new THREE.LineBasicMaterial({
      vertexColors: true,
      transparent: true,
      opacity: 0.6,
    })
    this.trail = new THREE.Line(trailGeo, trailMat)
    this.trailPosArr = trailPos
    this.trailColArr = trailCol

    // Speed history for color mapping
    this.trailSpeeds = []

    // Name label (sprite)
    const labelCanvas = document.createElement('canvas')
    labelCanvas.width = 128
    labelCanvas.height = 32
    const lctx = labelCanvas.getContext('2d')
    lctx.font = '18px monospace'
    lctx.fillStyle = `#${config.color.toString(16).padStart(6, '0')}`
    lctx.textAlign = 'center'
    lctx.fillText(config.name, 64, 22)
    const labelTex = new THREE.CanvasTexture(labelCanvas)
    const labelMat = new THREE.SpriteMaterial({ map: labelTex, transparent: true, opacity: 0.5 })
    this.label = new THREE.Sprite(labelMat)
    this.label.scale.set(10, 2.5, 1)
    this.label.position.set(0, config.radius + 4, 0)
    this.mesh.add(this.label)

    scene.add(this.mesh)
    scene.add(this.trail)
  }

  updateTrail() {
    const speed = this.vel.length()
    this.trailPositions.push(this.pos.clone())
    this.trailSpeeds.push(speed)

    if (this.trailPositions.length > this.trailMaxLen) {
      this.trailPositions.shift()
      this.trailSpeeds.shift()
    }

    const len = this.trailPositions.length
    const baseColor = new THREE.Color(this.config.color)
    const hotColor = new THREE.Color(0xffffff)

    // Find max speed for normalization
    let maxSpd = 1
    for (const s of this.trailSpeeds) if (s > maxSpd) maxSpd = s

    for (let i = 0; i < len; i++) {
      this.trailPosArr[i*3]   = this.trailPositions[i].x
      this.trailPosArr[i*3+1] = this.trailPositions[i].y
      this.trailPosArr[i*3+2] = this.trailPositions[i].z

      // Color: base color → white based on speed
      const sNorm = this.trailSpeeds[i] / maxSpd
      const fade = i / len // older = dimmer
      const c = baseColor.clone().lerp(hotColor, sNorm * 0.6)
      this.trailColArr[i*3]   = c.r * fade
      this.trailColArr[i*3+1] = c.g * fade
      this.trailColArr[i*3+2] = c.b * fade
    }

    this.trail.geometry.attributes.position.needsUpdate = true
    this.trail.geometry.attributes.color.needsUpdate = true
    this.trail.geometry.setDrawRange(0, len)
  }

  updateMesh(time) {
    this.mesh.position.copy(this.pos)

    // Pulse glow
    const pulse = 1 + Math.sin(time * 2.5 + this.config.mass) * 0.12
    this.glow.scale.setScalar(pulse)

    // Light intensity varies with speed
    const speed = this.vel.length()
    this.light.intensity = 0.5 + Math.min(speed * 0.05, 1.5)
  }

  remove() {
    scene.remove(this.mesh)
    scene.remove(this.trail)
    this.alive = false
  }
}

// ========================
// STATE
// ========================
let bodies = []
let simTime = 0
let paused = false
let showTrails = true
let timeScale = 1.0 // speed multiplier
let fps = 60
let frameCount = 0
let lastFpsTime = performance.now()
let initialEnergy = null

// ========================
// PHYSICS
// ========================
function computeAccelerations() {
  for (const b of bodies) b.acc.set(0, 0, 0)

  for (let i = 0; i < bodies.length; i++) {
    for (let j = i + 1; j < bodies.length; j++) {
      const a = bodies[i], b = bodies[j]
      const dx = b.pos.x - a.pos.x
      const dy = b.pos.y - a.pos.y
      const dz = b.pos.z - a.pos.z
      const distSq = dx*dx + dy*dy + dz*dz + SOFTENING * SOFTENING
      const dist = Math.sqrt(distSq)
      const F = G / (distSq * dist)

      a.acc.x += F * b.mass * dx
      a.acc.y += F * b.mass * dy
      a.acc.z += F * b.mass * dz
      b.acc.x -= F * a.mass * dx
      b.acc.y -= F * a.mass * dy
      b.acc.z -= F * a.mass * dz
    }
  }
}

function handleCollisions() {
  for (let i = 0; i < bodies.length; i++) {
    for (let j = i + 1; j < bodies.length; j++) {
      const a = bodies[i], b = bodies[j]
      const dist = a.pos.distanceTo(b.pos)
      const minDist = (a.config.radius + b.config.radius) * 1.2

      if (dist < minDist && dist > 0.01) {
        // Elastic collision (bounce)
        const normal = b.pos.clone().sub(a.pos).normalize()

        // Relative velocity along collision normal
        const relVel = a.vel.clone().sub(b.vel)
        const velAlongNormal = relVel.dot(normal)

        // Only resolve if approaching
        if (velAlongNormal > 0) {
          const totalMass = a.mass + b.mass
          const impulse = (2 * velAlongNormal) / totalMass

          a.vel.addScaledVector(normal, -impulse * b.mass * BOUNCE_DAMPING)
          b.vel.addScaledVector(normal, impulse * a.mass * BOUNCE_DAMPING)
        }

        // Separate overlapping bodies
        const overlap = minDist - dist
        const sep = normal.multiplyScalar(overlap * 0.6)
        a.pos.sub(sep)
        b.pos.add(sep)
      }
    }
  }
}

function step(dt) {
  if (bodies.length < 2) return

  // Velocity Verlet
  for (const b of bodies) {
    b.pos.x += b.vel.x * dt + 0.5 * b.acc.x * dt * dt
    b.pos.y += b.vel.y * dt + 0.5 * b.acc.y * dt * dt
    b.pos.z += b.vel.z * dt + 0.5 * b.acc.z * dt * dt
  }

  const oldAccs = bodies.map(b => b.acc.clone())
  computeAccelerations()

  for (let i = 0; i < bodies.length; i++) {
    const b = bodies[i]
    b.vel.x += 0.5 * (oldAccs[i].x + b.acc.x) * dt
    b.vel.y += 0.5 * (oldAccs[i].y + b.acc.y) * dt
    b.vel.z += 0.5 * (oldAccs[i].z + b.acc.z) * dt
  }

  handleCollisions()
  simTime += dt
}

function computeEnergy() {
  let K = 0, U = 0
  for (const b of bodies) K += 0.5 * b.mass * b.vel.lengthSq()
  for (let i = 0; i < bodies.length; i++)
    for (let j = i + 1; j < bodies.length; j++) {
      const d = bodies[i].pos.distanceTo(bodies[j].pos)
      U -= G * bodies[i].mass * bodies[j].mass / Math.max(d, SOFTENING)
    }
  return { K, U, total: K + U }
}

// ========================
// SPAWNING
// ========================
const raycaster = new THREE.Raycaster()
const mouseNDC = new THREE.Vector2()
const spawnPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0)

// Predefined interesting starting positions for stable orbits
const PRESETS = [
  // Body 0: center-ish
  () => ({
    pos: new THREE.Vector3(0, 0, 0),
    vel: new THREE.Vector3(0, 0, 0),
  }),
  // Body 1: orbiting body 0
  () => {
    const b0 = bodies[0]
    const angle = Math.random() * Math.PI * 2
    const dist = 25 + Math.random() * 15
    const pos = new THREE.Vector3(
      b0.pos.x + Math.cos(angle) * dist,
      (Math.random() - 0.5) * 10,
      b0.pos.z + Math.sin(angle) * dist,
    )
    const orbitalSpeed = Math.sqrt(G * b0.mass / dist) * (0.5 + Math.random() * 0.3)
    const vel = new THREE.Vector3(
      -Math.sin(angle) * orbitalSpeed,
      (Math.random() - 0.5) * orbitalSpeed * 0.2,
      Math.cos(angle) * orbitalSpeed,
    )
    return { pos, vel }
  },
  // Body 2: entering from further out
  () => {
    const com = getCenterOfMass()
    const angle = Math.random() * Math.PI * 2
    const dist = 40 + Math.random() * 20
    const pos = new THREE.Vector3(
      com.x + Math.cos(angle) * dist,
      (Math.random() - 0.5) * 15,
      com.z + Math.sin(angle) * dist,
    )
    const totalMass = bodies.reduce((s, b) => s + b.mass, 0)
    const orbitalSpeed = Math.sqrt(G * totalMass / dist) * (0.4 + Math.random() * 0.4)
    // Add tangential + slight radial component for chaos
    const tangent = new THREE.Vector3(-Math.sin(angle), 0, Math.cos(angle))
    const vel = tangent.multiplyScalar(orbitalSpeed)
    vel.y += (Math.random() - 0.5) * orbitalSpeed * 0.4
    return { pos, vel }
  },
]

function getClickPosition(screenX, screenY) {
  mouseNDC.x = (screenX / window.innerWidth) * 2 - 1
  mouseNDC.y = -(screenY / window.innerHeight) * 2 + 1
  raycaster.setFromCamera(mouseNDC, camera)
  const pos = new THREE.Vector3()
  if (!raycaster.ray.intersectPlane(spawnPlane, pos)) {
    raycaster.ray.at(60, pos)
  }
  return pos
}

function spawnBody(screenX, screenY) {
  if (bodies.length >= MAX_BODIES) return

  const idx = bodies.length
  const config = PLANET_CONFIGS[idx]
  const clickPos = getClickPosition(screenX, screenY)

  let pos, vel

  if (idx === 0) {
    pos = clickPos
    vel = new THREE.Vector3(0, 0, 0)
  } else {
    // Spawn at click position, calculate orbital velocity around existing bodies
    pos = clickPos
    const com = getCenterOfMass()
    const toCenter = com.clone().sub(pos)
    const dist = toCenter.length()

    const totalMass = bodies.reduce((s, b) => s + b.mass, 0)
    const orbitalSpeed = Math.sqrt(G * totalMass / Math.max(dist, 10)) * (0.45 + Math.random() * 0.2)

    // Tangential velocity (perpendicular to radial, in xz plane)
    vel = toCenter.clone().cross(new THREE.Vector3(0, 1, 0)).normalize()
    vel.multiplyScalar(orbitalSpeed)
    // Slight y perturbation for 3D orbits
    vel.y += (Math.random() - 0.5) * orbitalSpeed * 0.25
  }

  const body = new Body(config, pos, vel)
  bodies.push(body)

  computeAccelerations()
  rebuildGravLines()
  updateUI()

  if (bodies.length === 2) initialEnergy = computeEnergy().total

  createSpawnFlash(pos, config.color)
}

function getCenterOfMass() {
  const com = new THREE.Vector3()
  let totalM = 0
  for (const b of bodies) { com.addScaledVector(b.pos, b.mass); totalM += b.mass }
  return totalM > 0 ? com.divideScalar(totalM) : com
}

function createSpawnFlash(pos, color) {
  const geo = new THREE.SphereGeometry(1, 12, 12)
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 })
  const flash = new THREE.Mesh(geo, mat)
  flash.position.copy(pos)
  scene.add(flash)

  // Ring
  const ringGeo = new THREE.RingGeometry(0.5, 1, 32)
  const ringMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
  const ring = new THREE.Mesh(ringGeo, ringMat)
  ring.position.copy(pos)
  ring.lookAt(camera.position)
  scene.add(ring)

  let scale = 1
  function animate() {
    scale += 0.6
    mat.opacity *= 0.92
    ringMat.opacity *= 0.9
    flash.scale.setScalar(scale)
    ring.scale.setScalar(scale * 3)
    ring.lookAt(camera.position)
    if (mat.opacity > 0.01) {
      requestAnimationFrame(animate)
    } else {
      scene.remove(flash); scene.remove(ring)
      geo.dispose(); mat.dispose(); ringGeo.dispose(); ringMat.dispose()
    }
  }
  animate()
}

// ========================
// UI
// ========================
const statusEl = document.getElementById('status')
const timeEl = document.getElementById('time-display')
const energyEl = document.getElementById('energy-display')
const fpsEl = document.getElementById('fps-display')
const hintEl = document.getElementById('spawn-hint')
const energyFill = document.getElementById('energy-fill')
const speedEl = document.getElementById('speed-display')
const timeCtrlEl = document.getElementById('time-control')

function updateUI() {
  statusEl.textContent = `bodies: ${bodies.length}/${MAX_BODIES}`
  if (bodies.length >= MAX_BODIES) {
    hintEl.style.opacity = '0'
  } else if (bodies.length > 0) {
    hintEl.innerHTML = `click to add body ${bodies.length + 1}/3<br><span style="font-size:11px;opacity:0.4">${bodies.length === 1 ? 'will orbit the first' : 'chaos begins'}</span>`
    hintEl.style.fontSize = '14px'
  }

  for (let i = 0; i < 3; i++) {
    const dot = document.getElementById(`dot${i}`)
    if (i < bodies.length) {
      dot.classList.add('active')
      dot.style.backgroundColor = `#${PLANET_CONFIGS[i].color.toString(16).padStart(6, '0')}`
      dot.style.color = `#${PLANET_CONFIGS[i].color.toString(16).padStart(6, '0')}`
    } else {
      dot.classList.remove('active')
      dot.style.backgroundColor = 'transparent'
    }
  }
}

// ========================
// EVENTS
// ========================
let isDragging = false
let mouseDownPos = { x: 0, y: 0 }

renderer.domElement.addEventListener('pointerdown', e => {
  mouseDownPos = { x: e.clientX, y: e.clientY }
  isDragging = false
})
renderer.domElement.addEventListener('pointermove', e => {
  if (Math.hypot(e.clientX - mouseDownPos.x, e.clientY - mouseDownPos.y) > 5) isDragging = true
})
renderer.domElement.addEventListener('click', e => {
  if (!isDragging) spawnBody(e.clientX, e.clientY)
})

// Touch tap
let touchStart = null
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() }
})
renderer.domElement.addEventListener('touchend', e => {
  if (touchStart && Date.now() - touchStart.t < 300) {
    const ct = e.changedTouches[0]
    if (Math.hypot(ct.clientX - touchStart.x, ct.clientY - touchStart.y) < 15) {
      spawnBody(touchStart.x, touchStart.y)
    }
  }
  touchStart = null
})

window.addEventListener('keydown', e => {
  switch(e.key.toLowerCase()) {
    case 'r':
      for (const b of bodies) b.remove()
      for (const l of gravLines) scene.remove(l.line)
      gravLines = []
      bodies = []
      simTime = 0
      initialEnergy = null
      timeScale = 1.0
      updateUI()
      hintEl.style.opacity = '1'
      hintEl.innerHTML = 'click to spawn a planet<br><span style="font-size:12px;opacity:0.5">up to 3 bodies</span>'
      hintEl.style.fontSize = '18px'
      break
    case 'p':
      paused = !paused
      break
    case 't':
      showTrails = !showTrails
      for (const b of bodies) b.trail.visible = showTrails
      break
    case 'arrowright':
      timeScale = Math.min(timeScale * 1.5, 10)
      showTimeControl()
      break
    case 'arrowleft':
      timeScale = Math.max(timeScale / 1.5, 0.1)
      showTimeControl()
      break
    case 'c':
      controls.target.copy(getCenterOfMass())
      break
    case 'a':
      controls.autoRotate = !controls.autoRotate
      break
    case ' ':
      e.preventDefault()
      paused = !paused
      break
    case 'b':
      bloomPass.strength = bloomPass.strength > 0 ? 0 : 0.6
      break
  }
})

function showTimeControl() {
  speedEl.textContent = `${timeScale.toFixed(1)}x`
  timeCtrlEl.textContent = `speed: ${timeScale.toFixed(1)}x`
  timeCtrlEl.style.opacity = '0.5'
  setTimeout(() => timeCtrlEl.style.opacity = '0', 1500)
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(window.innerWidth, window.innerHeight)
  composer.setSize(window.innerWidth, window.innerHeight)
})

// ========================
// MAIN LOOP
// ========================
function animate() {
  requestAnimationFrame(animate)

  if (!paused && bodies.length >= 2) {
    const substeps = BASE_SUBSTEPS
    const dt = BASE_DT * timeScale
    for (let s = 0; s < substeps; s++) step(dt)

    if (frameCount % 2 === 0) {
      for (const b of bodies) b.updateTrail()
    }
  }

  const time = performance.now() * 0.001
  for (const b of bodies) b.updateMesh(time)

  // Gravity connection lines
  if (bodies.length >= 2) updateGravLines()

  // Camera gently follows CoM
  if (bodies.length > 0) {
    controls.target.lerp(getCenterOfMass(), 0.015)
  }

  controls.update()
  composer.render()

  // HUD
  frameCount++
  const now = performance.now()
  if (now - lastFpsTime > 500) {
    fps = Math.round(frameCount / ((now - lastFpsTime) / 1000))
    frameCount = 0
    lastFpsTime = now
    fpsEl.textContent = `${fps} fps`
  }

  timeEl.textContent = `t = ${simTime.toFixed(2)}`

  if (bodies.length >= 2 && frameCount % 8 === 0) {
    const e = computeEnergy()
    energyEl.textContent = `E = ${e.total.toFixed(0)}`
    if (initialEnergy !== null && initialEnergy !== 0) {
      const drift = Math.abs((e.total - initialEnergy) / Math.abs(initialEnergy))
      const pct = Math.max(2, Math.min(98, 50 + drift * 500))
      energyFill.style.width = `${pct}%`
    }
  }
}

updateUI()
animate()
</script>
</body>
</html>
